<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Bangaliana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { font-size: 28px; margin-bottom: 30px; text-align: center; color: #333; }
        .form-section { margin-bottom: 25px; }
        .form-section h3 { font-size: 14px; color: #666; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: #333; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #555; }
        .footer { margin-top: 20px; text-align: center; font-size: 14px; color: #666; }
        a { color: #333; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>

    <script>
        function togglePassword() {
            const password = document.getElementById("password");

            if (password.type === "password") {
                password.type = "text";
            } else {
                password.type = "password";
            }
        }
    </script>
</head>
<body>
<div class="container">
    <h1>Create Account</h1>

    <form method="POST" th:action="@{/register}">

        <div class="form-section">
            <h3>Login Credentials</h3>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required/>
            </div>

            <div style="position: relative;">
                <input type="password"
                       id="password"
                       name="password"
                       required/>

                <span onclick="togglePassword()"
                      style="position:absolute;
                 right:10px;
                 top:12px;
                 cursor:pointer;">
        👁
    </span>
            </div>
        </div>

        <div class="form-section">
            <h3>Personal Information</h3>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required/>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="tel" id="phoneNumber" name="phoneNumber" required/>
            </div>
        </div>

        <div class="form-section">
            <h3>Delivery Address</h3>

            <div class="form-group">
                <label for="street">Street</label>
                <input type="text" id="street" name="street" required/>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" required/>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" name="state" required/>
                </div>
            </div>

            <div class="form-group">
                <label for="zip">Zip Code</label>
                <input type="text" id="zip" name="zip" required/>
            </div>
        </div>

        <button type="submit">Create Account</button>
    </form>

    <div class="footer">
        <p>Already registered? <a th:href="@{/login}">Login here</a></p>
    </div>
</div>
</body>
</html>
